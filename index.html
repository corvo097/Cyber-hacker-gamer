<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERDESK OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="matrix"></canvas>
<div class="grid"></div>

<div id="os-container">

<header id="top-bar">

<div class="hud">
<span>USER</span>
<b>CORVO</b>
</div>

<div class="hud">
<span>CRED</span>
<b id="money">0</b>
</div>

<div class="hud">
<span>BOTS</span>
<b id="bots">0</b>
</div>

<div class="hud">
<span>DEF</span>
<b id="def-lv">1</b>
</div>

<div class="risk-box">
RISK <span id="trace-txt">0</span>%
<div class="bar">
<div id="trace-fill"></div>
</div>
</div>

</header>

<div id="main">

<nav id="sidebar">

<button onclick="tab('term')">💻 TERMINAL</button>
<button onclick="tab('net')">🌐 REDE</button>
<button onclick="tab('bot')">🤖 BOTNET</button>
<button onclick="tab('deep')">🕶 DEEPWEB</button>
<button onclick="tab('mail')">📨 MSG</button>

</nav>

<section id="viewport">

<div id="t-term" class="tab active">

<div id="log"></div>

<div class="input-line">
<span>#</span>
<input id="cmd" autocomplete="off">
</div>

</div>

<div id="t-net" class="tab">

<h3>MAPA DE REDE</h3>

<canvas id="network"></canvas>

</div>

<div id="t-bot" class="tab">

<div class="card">
<h3>BOTNET</h3>
<p>Nós ativos <span id="bot-n">0</span></p>
<button onclick="buy('bot')" class="action">Comprar Bots</button>
</div>

</div>

<div id="t-deep" class="tab">

<div class="card">
<h3>DEEP MARKET</h3>

<button onclick="buy('vpn')" class="action">VPN $300</button>
<button onclick="buy('def')" class="action">Firewall $1000</button>
<button onclick="buy('nuke')" class="action">Limpar Logs $2000</button>

</div>

</div>

<div id="t-mail" class="tab">
<div id="mails"></div>
</div>

</section>

</div>

</div>

<div id="alert" class="glitch"></div>

<audio id="typeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-fast-typing-on-keyboard-2544.mp3"></audio>
<audio id="hackSound" src="https://assets.mixkit.co/sfx/preview/mixkit-digital-typing-1290.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
